name: Auto Build & Release on Push

on:
  workflow_dispatch:
  push:
    branches:
      - main # Het script start nu bij elke push naar de main branch

jobs:
  check_messages:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.analysis.outputs.should_run }}
    steps:
      - name: Check commit messages
        id: analysis
        uses: actions/github-script@v7
        with:
          script: |
            // Haal de commit messages op (geeft een lege array bij workflow_dispatch)
            const messages = ${{ toJson(github.event.commits.*.message) }} || [];
            const combined = messages.join(' ').toLowerCase();
            
            // De woorden die we willen blokkeren
            const forbidden = ['no-app', 'no app', 'geen-app', 'geen app'];
            
            // Check of een van de woorden voorkomt
            const containsForbidden = forbidden.some(word => combined.includes(word));
            
            // Zet de output (we runnen alleen als het NIET verboden is)
            core.setOutput('should_run', !containsForbidden);
          
  build:
    needs: check_messages
    if: >
     github.event_name == 'workflow_dispatch' ||
     needs.check_messages.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # Genereer een unieke tag op basis van datum/tijd
      - name: Generate Random Tag
        id: tag_gen
        run: |
          TAG_NAME="v$(date +'%Y.%m.%d-%H%M%S')"
          echo "new_tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Gegenereerde tag: $TAG_NAME"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Build Web App
        run: |
          npm run build || (mkdir -p dist && echo "<html><body>Build fallback</body></html>" > dist/index.html)

      - name: Initialize & Add Android
        run: |
          WEB_DIR=$(if [ -d "dist" ]; then echo "dist"; else echo "."; fi)
          npx cap init "Krachtschaak" com.krachtschaak --web-dir $WEB_DIR
          npx cap add android || true
          
      - name: Generate App Icons
        run: |
          mkdir -p assets
          cp public/icon.jpg assets/icon.jpg
          npm install -D @capacitor/assets
          npx capacitor-assets generate

      - name: Fix Kotlin Duplicate Classes
        run: |
          echo "configurations.all {
              resolutionStrategy {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
              }
          }" >> android/app/build.gradle

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Sign APK Manually
        run: |
          # 1. Decodeer de keystore uit je secret naar een echt bestand
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore

          # 2. Zoek het pad naar de nieuwste Android build-tools op de server
          # Dit zorgt dat we niet afhankelijk zijn van een specifiek versienummer zoals 29.0.3
          BUILD_TOOLS_PATH=$(ls -d $ANDROID_HOME/build-tools/* | tail -1)
          echo "Gebruikte build-tools: $BUILD_TOOLS_PATH"

          # 3. Zipalign de APK (nodig voor installatie)
          # We zoeken de unsigned apk die Gradle net heeft gemaakt
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          $BUILD_TOOLS_PATH/zipalign -v 4 "$UNSIGNED_APK" krachtschaak-aligned.apk

          # 4. Onderteken de APK met de keystore
          $BUILD_TOOLS_PATH/apksigner sign --ks release.keystore \
            --ks-key-alias ${{ secrets.KEY_ALIAS }} \
            --ks-pass pass:${{ secrets.KEYSTORE_PASSWORD }} \
            --key-pass pass:${{ secrets.KEY_PASSWORD }} \
            --out krachtschaak.apk krachtschaak-aligned.apk
          
          echo "APK_PATH=krachtschaak.apk" >> $GITHUB_ENV

      # Maak de release aan met de gegenereerde tag
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_gen.outputs.new_tag }}
          name: ${{ steps.tag_gen.outputs.new_tag }}
          # We gebruiken de signed APK van de 'sign_app' stap
          files: ${{ env.APK_PATH }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
